name: Build iOS App

# WP-53 — iOS support: best-effort / experimental, hardened in v1.39.1.
#
# CURRENT STATUS: no step in this workflow has been confirmed to succeed
# end-to-end. It was authored and iterated on without access to a macOS/
# Xcode environment or a real Apple Developer account. Two things must
# happen before iOS can be considered reliable:
#   1. A maintainer with Xcode access needs to confirm the compile-check
#      path below (and ideally a full simulator build) actually succeeds
#      against this codebase.
#   2. Real Apple Developer signing material needs to be added as
#      repository secrets (see "Signed release build" below) before a
#      distributable IPA can be produced.
#
# Because of that, this job intentionally does NOT run on every push/PR —
# it would either fail noisily on an unrelated change or silently no-op,
# and neither is a useful CI gate yet. It runs:
#   - on demand (workflow_dispatch), for a maintainer to check current status
#   - weekly, to catch Tauri/Xcode/dependency drift before it piles up
#   - on GitHub Release events, where a real signed build is actually wanted
#
# Two tiers of Apple credentials are checked for, independently:
#   - APPLE_DEVELOPMENT_TEAM alone lets Tauri generate the Xcode project and
#     attempt a full (still unsigned-for-distribution) simulator build.
#   - The full signing secret set (below) additionally allows exporting a
#     distributable, signed .ipa on release events.
# With neither configured, the job falls back to `cargo check` against the
# iOS simulator target — this catches Rust-level compilation breakage
# without needing Xcode signing, a real Apple Developer account, or a
# device/simulator to run on. It does NOT catch Swift/Xcode-side issues;
# that requires at least APPLE_DEVELOPMENT_TEAM to be configured.
#
# Required Info.plist entries: the app's QR scanner (html5-qrcode, used from
# the webview) needs camera access, which iOS refuses silently/crashes on
# without a usage description string. `src-tauri/Info.ios.plist` supplies
# NSCameraUsageDescription and is wired in via `bundle.iOS.infoPlist` in
# tauri.conf.json, which `cargo tauri ios init` merges into the generated
# Xcode project's Info.plist. This has NOT been confirmed against a real
# `cargo tauri ios init`/build — that requires APPLE_DEVELOPMENT_TEAM, which
# is not yet configured (see above) — so treat it as "should work per the
# Tauri config schema" rather than "verified." If a future permission-gated
# API is added (microphone, photo library, location, etc.), add the matching
# NS*UsageDescription key to that same file.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ios:
    name: Build iOS app
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      # ── Determine what level of Apple signing is configured ────────────────
      # `has_dev_team` gates whether we attempt a real Tauri/Xcode build at
      # all. `has_release_signing` additionally requires the distribution
      # certificate and provisioning profile, and gates the signed-IPA
      # export path further down. Neither secret exists in this repository
      # yet, so both currently evaluate to "false" on every run.
      - name: Check for Apple signing configuration
        id: signing
        run: |
          if [ -n "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" ]; then
            echo "has_dev_team=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dev_team=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_DEVELOPMENT_TEAM is not set. Skipping the Tauri/Xcode build and falling back to 'cargo check' for iOS — this validates Rust compilation only, not the Swift/Xcode side."
          fi

          if [ -n "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" ] && \
             [ -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ] && \
             [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ] && \
             [ -n "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" ] && \
             [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            echo "has_release_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_release_signing=false" >> "$GITHUB_OUTPUT"
          fi

      # ── No credentials: compile-time validation only ───────────────────────
      # Deliberately independent of `cargo tauri ios init` — that step needs
      # a development team to generate a working Xcode project (Tauri falls
      # back to auto-detecting a signed-in Xcode account otherwise, which a
      # CI runner never has), so it is skipped entirely rather than attempted
      # and allowed to fail. `cargo check` needs no Xcode project at all.
      - name: Compile-check for iOS (no Apple credentials configured)
        if: steps.signing.outputs.has_dev_team == 'false'
        run: cargo check --target aarch64-apple-ios-sim --manifest-path src-tauri/Cargo.toml

      # ── APPLE_DEVELOPMENT_TEAM configured: attempt a real build ────────────
      # Tauri reads the team ID from this exact environment variable name
      # (see IosConfig::development_team in tauri-utils — it takes priority
      # over any developmentTeam value in tauri.conf.json, which is
      # deliberately left unset there for this reason). Always regenerated
      # fresh, matching the Android job's `rm -rf gen/android` approach, so
      # the committed repo never needs to carry a generated Xcode project.
      - name: Initialize Tauri iOS project
        if: steps.signing.outputs.has_dev_team == 'true'
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          rm -rf src-tauri/gen/apple
          cargo tauri ios init --ci

      - name: Build for iOS Simulator (debug)
        if: steps.signing.outputs.has_dev_team == 'true'
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: cargo tauri ios build --debug --target aarch64-sim

      # ── Signed release IPA (GitHub Release events, full signing secrets only) ──
      # Requires these secrets, none of which exist in this repository yet:
      #   APPLE_DEVELOPMENT_TEAM             – Apple Developer Team ID
      #   APPLE_CERTIFICATE_BASE64           – base64-encoded .p12 distribution certificate
      #   APPLE_CERTIFICATE_PASSWORD         – password for the .p12 file
      #   APPLE_PROVISIONING_PROFILE_BASE64  – base64-encoded .mobileprovision file
      #   APPLE_SIGNING_IDENTITY             – e.g. "Apple Distribution: Your Org (TEAMID)"
      - name: Verify release signing secrets present
        if: github.event_name == 'release'
        run: |
          if [ "${{ steps.signing.outputs.has_release_signing }}" != "true" ]; then
            echo "::error::Release build requires all Apple signing secrets: APPLE_DEVELOPMENT_TEAM, APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD, APPLE_PROVISIONING_PROFILE_BASE64, APPLE_SIGNING_IDENTITY. See the comment block at the top of this workflow."
            echo "iOS distribution requires a real Apple Developer account — these cannot be generated automatically."
            exit 1
          fi
          echo "All release signing secrets are present."

      - name: Import signing certificate and provisioning profile
        if: github.event_name == 'release' && steps.signing.outputs.has_release_signing == 'true'
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build signed release IPA
        if: github.event_name == 'release' && steps.signing.outputs.has_release_signing == 'true'
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: cargo tauri ios build --export-method app-store-connect

      - name: Collect release IPA
        if: github.event_name == 'release' && steps.signing.outputs.has_release_signing == 'true'
        run: |
          mkdir -p artifacts
          IPA=$(find src-tauri/gen/apple -name "*.ipa" -type f | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: No IPA found. Build output tree:"
            find src-tauri/gen/apple -type f 2>/dev/null || true
            exit 1
          fi
          cp "$IPA" artifacts/SteloPTC-iOS-Release.ipa
          echo "Packaged: $(basename "$IPA") → SteloPTC-iOS-Release.ipa"

      - name: Upload release IPA artifact
        if: github.event_name == 'release' && steps.signing.outputs.has_release_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SteloPTC-iOS-Release
          path: artifacts/SteloPTC-iOS-Release.ipa
          retention-days: 90

      # Uploading to TestFlight/App Store Connect additionally requires an
      # App Store Connect API key (issuer ID, key ID, .p8 file) and is left
      # as a manual step for now — see README.md "Downloads" for the current
      # distribution status.
      - name: Attach release IPA to GitHub Release
        if: github.event_name == 'release' && steps.signing.outputs.has_release_signing == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/SteloPTC-iOS-Release.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
