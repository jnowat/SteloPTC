name: Tests

on:
  push:
    branches:
      - master
      - 'claude/**'
  pull_request:
    branches: [master]

jobs:
  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Vitest
        run: npm test

  rust-tests:
    name: Rust (cargo test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev

      - name: Run cargo test
        working-directory: src-tauri
        run: cargo test --lib 2>&1

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Version sync check
        run: |
          VERSION_PKG=$(node -p "require('./package.json').version")
          VERSION_TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          VERSION_CARGO=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$VERSION_PKG" != "$VERSION_TAURI" ] || [ "$VERSION_PKG" != "$VERSION_CARGO" ]; then
            echo "VERSION MISMATCH:"
            echo "  package.json:     $VERSION_PKG"
            echo "  tauri.conf.json:  $VERSION_TAURI"
            echo "  Cargo.toml:       $VERSION_CARGO"
            exit 1
          fi
          echo "Version sync OK: $VERSION_PKG"

      - name: Svelte type-check (svelte-check)
        run: npm run check

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev

      - name: Rust lint (cargo clippy)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
